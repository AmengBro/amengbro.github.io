<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ameng 资源站</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0d1117;
            --bg-sub: #161b22;
            --bg-hover: #1c2128;
            --border: #30363d;
            --border-light: #21262d;
            --text: #e6edf3;
            --text-sub: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --radius: 6px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            --transition: all 0.15s ease;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .topbar {
            height:48px; border-bottom:1px solid var(--border);
            display:flex; align-items:center; padding:0 16px; gap:12px;
            background:var(--bg-sub);
        }
        .topbar-logo { display:flex; align-items:center; gap:6px; font-weight:600; font-size:0.85rem; color:var(--text); text-decoration:none; }
        .topbar-logo img { width:20px; height:20px; border-radius:50%; object-fit:cover; }
        .topbar-nav { display:flex; gap:2px; margin-left:8px; }
        .topbar-link { padding:4px 10px; border-radius:var(--radius); font-size:0.8rem; font-weight:500; color:var(--text-sub); text-decoration:none; }
        .topbar-link:hover { color:var(--text); background:var(--bg-hover); }
        .topbar-link.active { color:var(--text); background:var(--bg-active); }

        .container { max-width:720px; margin:0 auto; padding:0 24px; }

        .hero { padding:72px 0 32px; text-align:center; }
        .hero .avatar { width:64px; height:64px; border-radius:50%; object-fit:cover; border:2px solid var(--border); margin-bottom:16px; }
        .hero h1 { font-size:2rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:8px; }
        .hero .tagline { color:var(--text-sub); font-size:0.95rem; max-width:420px; margin:0 auto 12px; }
        .hero .terminal { display:inline-flex; align-items:center; gap:8px; padding:6px 14px; background:var(--bg-sub); border:1px solid var(--border); border-radius:var(--radius); font-family:var(--font-mono); font-size:0.78rem; color:var(--accent-green); }
        .hero .terminal .prompt { color:var(--accent); }
        .hero .terminal .cursor { display:inline-block; width:6px; height:14px; background:var(--accent-green); animation:blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity:0; } }

        .panel { background:var(--bg-sub); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:16px; overflow:hidden; }
        .panel-header { padding:8px 12px; border-bottom:1px solid var(--border-light); font-size:0.78rem; font-weight:600; color:var(--text-sub); display:flex; align-items:center; gap:6px; background:var(--bg); }
        .panel-header i { font-size:0.85rem; }
        .panel-body { padding:12px; }

        .cat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
        .cat-card { display:flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid var(--border); border-radius:var(--radius); text-decoration:none; color:inherit; transition:var(--transition); }
        .cat-card:hover { background:var(--bg-hover); border-color:var(--text-muted); }
        .cat-card .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
        .cat-card i { font-size:1rem; }
        .cat-card .label { font-size:0.82rem; font-weight:500; }
        .cat-card .count { margin-left:auto; font-size:0.7rem; color:var(--text-muted); background:var(--bg); padding:1px 6px; border-radius:8px; }

        .feat-row { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid var(--border-light); text-decoration:none; color:inherit; }
        .feat-row:last-child { border-bottom:none; }
        .feat-row:hover .feat-name { color:var(--accent); }
        .feat-icon { width:24px; text-align:center; font-size:0.85rem; }
        .feat-body { flex:1; min-width:0; }
        .feat-name { font-size:0.82rem; font-weight:500; transition:var(--transition); }
        .feat-desc { font-size:0.72rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .feat-meta { font-size:0.7rem; color:var(--text-muted); flex-shrink:0; }
        .feat-meta i { font-size:0.7rem; }

        .panel-footer-link { display:block; padding:6px 12px; text-align:center; font-size:0.78rem; color:var(--accent); text-decoration:none; border-top:1px solid var(--border-light); }
        .panel-footer-link:hover { background:var(--bg-hover); }
        .panel-footer-link i { font-size:0.7rem; }

        .stats-row { display:flex; gap:24px; flex-wrap:wrap; font-size:0.82rem; color:var(--text-sub); }
        .stats-row i { font-size:0.85rem; margin-right:2px; }
        .stats-row strong { color:var(--text); }

        .footer { border-top:1px solid var(--border); padding:24px; text-align:center; color:var(--text-muted); font-size:0.72rem; margin-top:32px; }
        .footer a { color:var(--text-muted); text-decoration:none; }
        .footer a:hover { color:var(--text-sub); }
        .footer i { color:var(--text-muted); }

        @media (max-width:600px) {
            .cat-grid { grid-template-columns:repeat(2,1fr); }
            .hero { padding:48px 0 24px; }
            .hero h1 { font-size:1.5rem; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="index.html" class="topbar-logo">
            <img src="AMlogo2.png" alt="A"> Ameng
        </a>
        <nav class="topbar-nav">
            <a href="index.html" class="topbar-link active">首页</a>
            <a href="resources.html" class="topbar-link">资源</a>
            <a href="about.html" class="topbar-link">关于</a>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <img src="AMlogo2.png" alt="Ameng" class="avatar">
            <h1>Ameng 资源站</h1>
            <p class="tagline">一个学生自制的资源分享站。工具、游戏、整蛊小软件，什么都有点。</p>
            <div class="terminal">
                <span class="prompt">$</span>
                <span>cat welcome.txt</span>
                <span class="cursor"></span>
            </div>
        </section>

        <div class="panel">
            <div class="panel-header"><i class="ri-folder-open-line"></i> 分类</div>
            <div class="panel-body">
                <div class="cat-grid" id="catGrid"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header"><i class="ri-star-line"></i> 精选</div>
            <div class="panel-body" id="featuredList"></div>
            <a href="resources.html" class="panel-footer-link">查看全部资源 <i class="ri-arrow-right-s-line"></i></a>
        </div>

        <div class="panel">
            <div class="panel-header"><i class="ri-bar-chart-box-line"></i> 概况</div>
            <div class="panel-body">
                <div class="stats-row">
                    <span><i class="ri-inbox-line"></i> 资源 <strong id="totalCount">19</strong></span>
                    <span><i class="ri-calendar-line"></i> 更新于 2025/09/30</span>
                    <span><i class="ri-heart-line"></i> 免费分享</span>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        Ameng 资源站 · Made with <i class="ri-heart-line" style="color:#f85149;"></i> by AmengBro · <a href="about.html">关于</a>
    </footer>

    <script src="resources.js"></script>
    <script>
        const catDefs = [
            {id:'tools',    label:'工具',    icon:'ri-tools-line',   tags:['工具','下载器','办公','压缩','Flash','插件'], color:'var(--accent-orange)' },
            {id:'games',    label:'游戏',    icon:'ri-gamepad-line',  tags:['游戏','二创','模拟'],                       color:'var(--accent-purple)' },
            {id:'pranks',   label:'整蛊',    icon:'ri-bug-line',      tags:['整蛊','伪装'],                             color:'var(--accent-orange)' },
            {id:'tutorial', label:'教程',    icon:'ri-book-2-line',   tags:['教程','Python'],                           color:'var(--accent-green)' },
            {id:'media',    label:'影音',    icon:'ri-music-2-line',  tags:['音乐','Scratch打包','电影','压片战争'],     color:'var(--text-muted)' },
            {id:'misc',     label:'其他',    icon:'ri-folder-line',   tags:[],                                          color:'var(--text-muted)' },
        ];

        function renderCats() {
            const grid = document.getElementById('catGrid');
            grid.innerHTML = catDefs.map(c => {
                const count = c.id === 'misc'
                    ? resources.filter(r => !catDefs.some(cd => cd.id !== 'misc' && cd.tags.some(t => r.tags.includes(t)))).length
                    : resources.filter(r => r.tags.some(t => c.tags.includes(t))).length;
                return `<a class="cat-card" href="resources.html">
                    <span class="dot" style="background:${c.color}"></span>
                    <i class="${c.icon}"></i>
                    <span class="label">${c.label}</span>
                    <span class="count">${count}</span>
                </a>`;
            }).join('');
        }

        function renderFeatured() {
            const list = document.getElementById('featuredList');
            const picks = [resources[8], resources[17], resources[4], resources[12], resources[10], resources[15]];
            list.innerHTML = picks.map(r => `
                <a class="feat-row" href="resources.html">
                    <span class="feat-icon">${r.i}</span>
                    <span class="feat-body">
                        <span class="feat-name">${r.n}</span>
                        <span class="feat-desc">${r.d}</span>
                    </span>
                    <span class="feat-meta"><i class="ri-calendar-line"></i> ${r.date}</span>
                </a>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('totalCount').textContent = resources.length;
            renderCats();
            renderFeatured();
        });
    </script>
</body>
</html>
